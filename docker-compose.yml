services:
  db:
    image: postgres:16
    container_name: ourmusic-db
    environment:
      POSTGRES_DB: ourmusic
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ourmusic_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ourmusic"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ourmusic-backend
    container_name: ourmusic-backend
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${OURMUSIC_PORT}:8808"
    environment:
      DB_URL: jdbc:postgresql://db:5432/ourmusic
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      MUSIC_PATH: /music
      ARTWORK_PATH: /artwork
      OURMUSIC_PORT: ${OURMUSIC_PORT}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      FFMPEG_PATH: ${FFMPEG_PATH}
      SUBSONIC_AUTH_SECRET: ${SUBSONIC_AUTH_SECRET}
      REQUEST_LOGGING_ENABLED: ${REQUEST_LOGGING_ENABLED}
    volumes:
      - ${MUSIC_PATH}:/music
      - ${ARTWORK_PATH}:/artwork
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8808/api/health >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    image: ourmusic-frontend
    container_name: ourmusic-frontend
    build:
      context: ./frontend
      args:
        API_REWRITE_BASE_URL: http://backend:8808
        NEXT_PUBLIC_API_BASE_URL: ""
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      API_REWRITE_BASE_URL: http://backend:8808
      NEXT_PUBLIC_API_BASE_URL: ""
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3000/login"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  ourmusic_postgres_data:
